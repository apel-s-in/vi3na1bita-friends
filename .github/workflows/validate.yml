name: Validate Friends module

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate ESM syntax
        run: |
          node --input-type=module --check < friends-core.js
          node --input-type=module --check < friends-crypto.js
          node --input-type=module --check < crypto-devices-ui.js
          node --input-type=module --check < friends-ui.js
          node --input-type=module --check < chat-text-ui.js
          node --input-type=module --check < voice-call-ui.js
          node --input-type=module --check < games-registry.js
          node --input-type=module --check < embedded-rpc-contract.js
          node --input-type=module --check < modal-adapter.js

      - name: Validate E2EE-only contract
        run: |
          if grep -En "['\"]chat_(send|delete|react)['\"]" friends-core.js; then
            echo "Legacy plaintext chat action found"
            exit 2
          fi

          if grep -En "clientSecret|X-Vi3-Player|X-Vi3-Secret" \
            friends-core.js friends-crypto.js chat-text-ui.js; then
            echo "Legacy authentication found"
            exit 2
          fi

          if grep -RFn "api.qrserver.com" \
            friends-ui.js crypto-devices-ui.js; then
            echo "External QR transport found"
            exit 2
          fi

      - name: Validate embedded RPC security
        run: |
          grep -q "purgeChatForBoth" embedded-rpc-contract.js
          grep -q "revokeCryptoDevice" embedded-rpc-contract.js
          grep -q "resetCryptoDevices" embedded-rpc-contract.js
          grep -q "dangerous: true" embedded-rpc-contract.js

          if grep -REn "play|pause|stop|setVolume|setMuted|seek|next|prev" \
            embedded-rpc-contract.js; then
            echo "Playback method found in Friends RPC contract"
            exit 2
          fi

          if grep -REn "\bconfirm\s*\(" \
            friends-ui.js chat-text-ui.js crypto-devices-ui.js voice-call-ui.js; then
            echo "Native confirm() found in Friends UI"
            exit 2
          fi
